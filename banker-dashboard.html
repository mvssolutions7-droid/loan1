<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banker Dashboard | Loan Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { transition: background-color 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
    .preview-image { cursor: pointer; transition: transform 0.2s; }
    .preview-image:hover { transform: scale(1.02); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950">
  <div id="app"></div>
  <div id="modal-container" class="fixed inset-0 z-50 hidden"></div>
  <div id="preview-modal" class="fixed inset-0 z-50 hidden bg-black/80 flex items-center justify-center"></div>
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full"></div>
  <script>
    const STORAGE_KEY = 'loan_management_data';
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    let currentUser = state.currentUser || {};

    // Log current user for debugging
    console.log('Current Banker User:', currentUser);

    // Initialize banks if not exists
    if (!state.banks) {
      state.banks = [
        { id: 'b1', name: 'Federal Trust Bank', minSalary: 25000, minCibil: 700, maxLoan: 5000000, interestRate: 10.5, status: 'Active', bankerEmail: 'amit@federaltrust.com' },
        { id: 'b2', name: 'National Alliance Bank', minSalary: 45000, minCibil: 750, maxLoan: 7500000, interestRate: 10.75, status: 'Active', bankerEmail: 'priya@nationalalliance.com' },
        { id: 'b3', name: 'Apex Credit Union', minSalary: 15000, minCibil: 650, maxLoan: 3000000, interestRate: 11.5, status: 'Active', bankerEmail: 'rahul@apexcu.com' },
        { id: 'b4', name: 'Metropolitan Bank', minSalary: 35000, minCibil: 720, maxLoan: 10000000, interestRate: 9.75, status: 'Active', bankerEmail: 'neha@metropolitan.com' }
      ];
    }

    // Initialize sample applications if none exist
    if (!state.applications || state.applications.length === 0) {
      state.applications = [
        {
          id: 'APP-SAMPLE-001',
          customerName: 'Aarav Sharma',
          customerEmail: 'aarav@gmail.com',
          customerMobile: '9876543210',
          loanAmount: 500000,
          monthlySalary: 40000,
          cibilScore: 720,
          loanPurpose: 'Home Renovation',
          loanTenure: 36,
          status: 'Pending',
          assignedBank: 'Federal Trust Bank',
          submittedBy: 'Customer',
          submittedDate: '2026-05-10',
          documents: {},
          activityLog: [{ action: 'Application Submitted', timestamp: new Date().toISOString(), by: 'Customer' }]
        },
        {
          id: 'APP-SAMPLE-002',
          customerName: 'Priya Patel',
          customerEmail: 'priya@yahoo.com',
          customerMobile: '9812345678',
          loanAmount: 1200000,
          monthlySalary: 65000,
          cibilScore: 780,
          loanPurpose: 'Business Expansion',
          loanTenure: 60,
          status: 'Pending',
          assignedBank: 'Federal Trust Bank',
          submittedBy: 'Connector',
          submittedDate: '2026-05-28',
          documents: {},
          activityLog: [{ action: 'Application Submitted', timestamp: new Date().toISOString(), by: 'Connector' }]
        }
      ];
      saveData();
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      let classes = 'bg-emerald-50 border-emerald-200 text-emerald-800 dark:bg-emerald-950/80';
      if (type === 'error') classes = 'bg-rose-50 border-rose-200 text-rose-900 dark:bg-rose-950/80';
      else if (type === 'warning') classes = 'bg-amber-50 border-amber-200 text-amber-800 dark:bg-amber-950/80';
      toast.className = `p-4 rounded-xl shadow-lg border animate-slide-in ${classes}`;
      toast.innerHTML = `<div class="text-xs font-semibold">${message}</div><button onclick="this.parentElement.remove()" class="ml-4 text-xs opacity-70">✕</button>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function logout() { 
      state.currentUser = null;
      saveData();
      window.location.href = 'index.html'; 
    }

    // Preview stored document from Base64
    function previewStoredDocument(dataUrl, fileName, fileType) {
      const previewModal = document.getElementById('preview-modal');
      previewModal.classList.remove('hidden');
      previewModal.innerHTML = `
        <div class="bg-white dark:bg-slate-900 rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-auto p-4 mx-4 relative" onclick="event.stopPropagation()">
          <div class="flex justify-between items-center mb-3 pb-2 border-b">
            <h4 class="font-bold">📄 Document Preview: ${fileName}</h4>
            <button onclick="closePreviewModal()" class="text-2xl text-slate-400 hover:text-slate-600">&times;</button>
          </div>
          <div class="flex justify-center items-center min-h-[300px]">
            ${fileType === 'image' ? 
              `<img src="${dataUrl}" class="max-w-full max-h-[70vh] object-contain rounded">` : 
              `<iframe src="${dataUrl}" class="w-full h-[70vh] border-0 rounded"></iframe>`
            }
          </div>
          <div class="mt-3 flex justify-end gap-2">
            <button onclick="window.open('${dataUrl}')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">Open in New Tab</button>
            <button onclick="closePreviewModal()" class="px-4 py-2 bg-gray-600 text-white rounded-lg text-sm">Close</button>
          </div>
        </div>
      `;
    }

    function closePreviewModal() {
      const previewModal = document.getElementById('preview-modal');
      previewModal.classList.add('hidden');
      previewModal.innerHTML = '';
    }

    window.previewStoredDocument = previewStoredDocument;
    window.closePreviewModal = closePreviewModal;

    // Close preview modal when clicking outside
    document.getElementById('preview-modal')?.addEventListener('click', function(e) {
      if (e.target === this) {
        closePreviewModal();
      }
    });

    // Show application details modal with document preview
    function showApplicationModal(app) {
      const modalContainer = document.getElementById('modal-container');
      modalContainer.classList.remove('hidden');
      modalContainer.innerHTML = `
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in" onclick="closeModal(event)">
          <div class="bg-white dark:bg-slate-900 rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6 shadow-2xl mx-4" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b pb-3 sticky top-0 bg-white dark:bg-slate-900">
              <h3 class="text-xl font-bold text-slate-900 dark:text-white">📋 Application Details</h3>
              <button onclick="closeModal()" class="text-2xl text-slate-400 hover:text-slate-600 transition">×</button>
            </div>
            <div class="space-y-4">
              <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Application ID</p><p class="font-bold text-blue-600">${app.id}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Status</p><p class="font-bold"><span class="px-2 py-1 rounded-full text-xs ${app.status === 'Bank Approved' ? 'bg-green-100 text-green-700' : app.status === 'Pending' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}">${app.status}</span></p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Customer Name</p><p class="font-bold">${app.customerName || 'N/A'}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Email</p><p class="font-bold">${app.customerEmail || 'N/A'}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Mobile</p><p class="font-bold">${app.customerMobile || 'N/A'}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Loan Amount</p><p class="font-bold text-green-600">₹${(app.loanAmount || 0).toLocaleString()}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Monthly Salary</p><p class="font-bold">₹${(app.monthlySalary || 0).toLocaleString()}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">CIBIL Score</p><p class="font-bold">${app.cibilScore || 'N/A'}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Loan Purpose</p><p class="font-bold">${app.loanPurpose || 'N/A'}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Loan Tenure</p><p class="font-bold">${app.loanTenure || 'N/A'} months</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Submitted By</p><p class="font-bold">${app.submittedBy || 'N/A'}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Submitted Date</p><p class="font-bold">${app.submittedDate || 'N/A'}</p></div>
              </div>
              
              <!-- Assigned Bank Info -->
              <div class="p-3 bg-teal-50 dark:bg-teal-950/30 rounded-xl">
                <p class="text-xs text-slate-400">Assigned Bank</p>
                <p class="font-bold text-teal-600">🏦 ${app.assignedBank || 'Not Assigned'}</p>
              </div>
              
              <!-- Documents Section with Preview -->
              <div class="border rounded-xl p-4">
                <p class="text-sm font-bold mb-3 text-blue-600">📎 Uploaded Documents</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                  ${app.documents && Object.keys(app.documents).length > 0 ? 
                    Object.entries(app.documents).map(([docName, docData]) => `
                      <div class="border rounded-lg p-3 bg-slate-50 dark:bg-slate-800/50">
                        <div class="flex items-center justify-between mb-2">
                          <span class="text-sm font-semibold capitalize">${docName.replace(/([A-Z])/g, ' $1').trim()}</span>
                          <span class="text-xs px-2 py-0.5 rounded-full ${docData.status === 'Uploaded' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-500'}">${docData.status || 'Pending'}</span>
                        </div>
                        ${docData.dataUrl ? `
                          <div class="mt-2">
                            ${docData.fileType === 'image' ? 
                              `<img src="${docData.dataUrl}" class="w-full h-32 object-cover rounded-lg cursor-pointer preview-image" onclick="previewStoredDocument('${docData.dataUrl}', '${docData.fileName}', 'image')">` : 
                              `<div class="flex items-center gap-2 p-2 bg-white dark:bg-slate-700 rounded-lg">
                                <span class="text-2xl">📄</span>
                                <span class="text-sm truncate flex-1">${docData.fileName}</span>
                                <button onclick="previewStoredDocument('${docData.dataUrl}', '${docData.fileName}', 'pdf')" class="px-2 py-1 bg-blue-500 text-white rounded text-xs">Preview</button>
                              </div>`
                            }
                            <p class="text-xs text-slate-400 mt-1 truncate">${docData.fileName || ''} (${docData.fileSize || '0 KB'})</p>
                          </div>
                        ` : docData.fileName ? 
                          `<p class="text-xs text-slate-500 mt-2">${docData.fileName} (${docData.fileSize})<br><span class="text-amber-600">⚠️ File too large for preview</span></p>` : 
                          '<p class="text-xs text-slate-400 mt-2 italic">No file uploaded</p>'}
                      </div>
                    `).join('') : 
                    '<p class="text-center text-slate-400 py-4 col-span-2">No documents uploaded</p>'
                  }
                </div>
              </div>
              
              <!-- Activity Log -->
              ${app.activityLog && app.activityLog.length ? `
              <div class="border rounded-xl p-4">
                <p class="text-sm font-bold mb-3 text-purple-600">📜 Activity Log</p>
                <div class="space-y-1 max-h-32 overflow-y-auto">
                  ${app.activityLog.map(log => `<div class="text-xs p-1"><span class="text-slate-400">${new Date(log.timestamp).toLocaleString()}</span> - ${log.action} <span class="text-slate-400">by ${log.by}</span></div>`).join('')}
                </div>
              </div>
              ` : ''}
            </div>
            <div class="mt-6 flex justify-end">
              <button onclick="closeModal()" class="px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">Close</button>
            </div>
          </div>
        </div>
      `;
    }

    function closeModal() {
      const modalContainer = document.getElementById('modal-container');
      modalContainer.classList.add('hidden');
      modalContainer.innerHTML = '';
    }

    // Close modal when clicking outside
    document.getElementById('modal-container')?.addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // Approve or reject application
    function updateApplicationStatus(appId, status, remarks) {
      const app = state.applications.find(a => a.id === appId);
      if (app) {
        const oldStatus = app.status;
        app.status = status === 'Approved' ? 'Bank Approved' : 'Rejected';
        app.bankerRemarks = remarks;
        app.bankerName = currentUser.name;
        app.decisionDate = new Date().toISOString().split('T')[0];
        if (!app.activityLog) app.activityLog = [];
        app.activityLog.push({ action: `${status} by banker: ${currentUser.name}`, timestamp: new Date().toISOString(), by: currentUser.name, remarks: remarks });
        saveData();
        showToast(`✅ Application ${appId} has been ${status}!`, status === 'Approved' ? 'success' : 'warning');
        render();
      }
    }

    window.closeModal = closeModal;
    window.showApplicationModal = showApplicationModal;
    window.updateApplicationStatus = updateApplicationStatus;

    // Get applications assigned to this banker's bank only
    function getMyBankApplications() {
      const bankerBankName = currentUser.bankName || currentUser.bankDetails?.name;
      console.log('Banker Bank Name:', bankerBankName);
      console.log('All Applications:', state.applications);
      
      const myApps = state.applications?.filter(app => 
        app.assignedBank === bankerBankName && 
        app.status !== 'Bank Approved' && 
        app.status !== 'Rejected'
      ) || [];
      
      console.log('Filtered Applications for banker:', myApps);
      return myApps;
    }

    function getMyApprovedApplications() {
      const bankerBankName = currentUser.bankName || currentUser.bankDetails?.name;
      return state.applications?.filter(app => 
        app.assignedBank === bankerBankName && 
        app.status === 'Bank Approved'
      ) || [];
    }

    function getMyRejectedApplications() {
      const bankerBankName = currentUser.bankName || currentUser.bankDetails?.name;
      return state.applications?.filter(app => 
        app.assignedBank === bankerBankName && 
        app.status === 'Rejected'
      ) || [];
    }

    function render() {
      const myApps = getMyBankApplications();
      const approvedApps = getMyApprovedApplications();
      const rejectedApps = getMyRejectedApplications();
      const bankerBankName = currentUser.bankName || currentUser.bankDetails?.name || 'Your Bank';
      
      document.getElementById('app').innerHTML = `
        <div class="flex min-h-screen">
          <aside class="w-64 fixed h-full bg-white dark:bg-slate-900 border-r shadow-lg">
            <div class="h-16 flex items-center px-6 border-b">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-teal-600 flex items-center justify-center text-white font-bold">B</div>
                <span class="font-bold text-lg bg-gradient-to-r from-teal-600 to-emerald-600 bg-clip-text text-transparent">${bankerBankName}</span>
              </div>
            </div>
            <div class="p-4">
              <div class="flex items-center gap-3 p-3 rounded-xl bg-gradient-to-br from-teal-500 to-emerald-600 text-white mb-6">
                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center font-bold text-lg">${(currentUser.name || 'B').charAt(0)}</div>
                <div>
                  <h4 class="font-semibold">${currentUser.name || 'Banker'}</h4>
                  <p class="text-xs opacity-80">${bankerBankName}</p>
                </div>
              </div>
              <nav class="space-y-1">
                <button onclick="showSection('dashboard')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">📊 Dashboard</button>
                <button onclick="showSection('pending')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">📋 Pending (${myApps.length})</button>
                <button onclick="showSection('approved')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">✅ Approved (${approvedApps.length})</button>
                <button onclick="showSection('rejected')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">❌ Rejected (${rejectedApps.length})</button>
                <button onclick="logout()" class="w-full text-left px-4 py-3 rounded-xl text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/20 transition-all">🚪 Logout</button>
              </nav>
            </div>
          </aside>
          <main class="flex-1 ml-64 p-6"><div id="content" class="animate-fade-in"></div></main>
        </div>
      `;
      showSection('dashboard');
    }

    function showSection(section) {
      const content = document.getElementById('content');
      const pendingApps = getMyBankApplications();
      const approvedApps = getMyApprovedApplications();
      const rejectedApps = getMyRejectedApplications();
      const bankerBankName = currentUser.bankName || currentUser.bankDetails?.name || 'Your Bank';
      
      if (section === 'dashboard') {
        content.innerHTML = `
          <div class="space-y-6">
            <div class="p-8 rounded-3xl bg-gradient-to-r from-teal-900 to-emerald-900 text-white shadow-xl relative overflow-hidden">
              <div class="absolute top-0 right-0 w-64 h-64 bg-teal-500/10 rounded-full blur-3xl"></div>
              <h3 class="text-2xl font-black tracking-tight">${bankerBankName} - Banker Portal</h3>
              <p class="text-sm text-teal-200 mt-2">Welcome, ${currentUser.name || 'Banker'}</p>
              <p class="text-xs text-teal-200/70 mt-1">You can only view applications assigned to ${bankerBankName}</p>
            </div>
            <div class="grid grid-cols-3 gap-6">
              <div class="p-6 bg-white dark:bg-slate-900 rounded-3xl border shadow-sm">
                <p class="text-slate-400">Pending Applications</p>
                <p class="text-3xl font-black text-amber-600">${pendingApps.length}</p>
              </div>
              <div class="p-6 bg-emerald-50 dark:bg-emerald-950/20 rounded-3xl border shadow-sm">
                <p class="text-emerald-700">Approved</p>
                <p class="text-3xl font-black text-emerald-700">${approvedApps.length}</p>
              </div>
              <div class="p-6 bg-rose-50 dark:bg-rose-950/20 rounded-3xl border shadow-sm">
                <p class="text-rose-700">Rejected</p>
                <p class="text-3xl font-black text-rose-700">${rejectedApps.length}</p>
              </div>
            </div>
            ${pendingApps.length > 0 ? `<button onclick="showSection('pending')" class="px-6 py-3 bg-teal-600 text-white rounded-xl font-bold shadow-lg shadow-teal-600/20 hover:bg-teal-700 transition">📋 Review Pending Applications →</button>` : '<p class="text-center text-slate-400 mt-4">No pending applications to review.</p>'}
          </div>
        `;
      }
      else if (section === 'pending') {
        if (pendingApps.length === 0) {
          content.innerHTML = `
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl text-center py-12">
              <div class="text-6xl mb-4">📭</div>
              <h4 class="text-lg font-black mb-2">No Pending Applications</h4>
              <p class="text-slate-400">No applications have been assigned to ${bankerBankName} yet.</p>
            </div>
          `;
        } else {
          content.innerHTML = `
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl">
              <h4 class="text-lg font-black mb-6">📋 Pending Applications for ${bankerBankName} (${pendingApps.length})</h4>
              <div class="space-y-4">
                ${pendingApps.map(app => `
                  <div class="p-5 border-2 border-amber-200 rounded-xl bg-amber-50/30">
                    <div class="flex justify-between items-start mb-3">
                      <div>
                        <h5 class="font-bold text-lg">${app.customerName}</h5>
                        <p class="text-sm text-slate-500">ID: ${app.id} • Submitted: ${app.submittedDate} • By: ${app.submittedBy}</p>
                      </div>
                      <span class="px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-xs">Pending Review</span>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 text-sm">
                      <div><p class="text-slate-400">Loan Amount</p><p class="font-bold">₹${(app.loanAmount || 0).toLocaleString()}</p></div>
                      <div><p class="text-slate-400">Salary</p><p class="font-bold">₹${(app.monthlySalary || 0).toLocaleString()}</p></div>
                      <div><p class="text-slate-400">CIBIL</p><p class="font-bold">${app.cibilScore || 'N/A'}</p></div>
                      <div><p class="text-slate-400">Loan Purpose</p><p class="font-bold">${app.loanPurpose || 'N/A'}</p></div>
                    </div>
                    <div class="mb-4 p-3 bg-blue-50 dark:bg-blue-950/20 rounded-lg">
                      <p class="text-sm font-semibold text-blue-700 mb-2">📝 Bank Eligibility Check:</p>
                      <div class="grid grid-cols-2 gap-2 text-sm">
                        <div>✓ Min Salary Required: ₹${state.banks.find(b => b.name === bankerBankName)?.minSalary?.toLocaleString() || 'N/A'}</div>
                        <div>✓ Applicant Salary: ₹${(app.monthlySalary || 0).toLocaleString()} ${app.monthlySalary >= (state.banks.find(b => b.name === bankerBankName)?.minSalary || 0) ? '✅' : '❌'}</div>
                        <div>✓ Min CIBIL Required: ${state.banks.find(b => b.name === bankerBankName)?.minCibil || 'N/A'}+</div>
                        <div>✓ Applicant CIBIL: ${app.cibilScore || 'N/A'} ${app.cibilScore >= (state.banks.find(b => b.name === bankerBankName)?.minCibil || 0) ? '✅' : '❌'}</div>
                      </div>
                    </div>
                    <div class="flex flex-wrap gap-3 items-center justify-between">
                      <div class="flex gap-2">
                        <select id="decision-${app.id}" class="px-3 py-2 border rounded-lg text-sm bg-white">
                          <option value="Approved">✅ Approve Loan</option>
                          <option value="Rejected">❌ Reject Loan</option>
                        </select>
                        <input type="text" id="remarks-${app.id}" placeholder="Remarks (optional)" class="px-3 py-2 border rounded-lg text-sm w-48">
                        <button onclick="updateApplicationStatus('${app.id}', document.getElementById('decision-${app.id}').value, document.getElementById('remarks-${app.id}').value)" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition">Submit Decision</button>
                      </div>
                      <button onclick="showApplicationModal(${JSON.stringify(app).replace(/"/g, '&quot;')})" class="px-3 py-1 bg-gray-600 text-white rounded-lg text-sm">View Full Details</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }
      }
      else if (section === 'approved') {
        if (approvedApps.length === 0) {
          content.innerHTML = `
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl text-center py-12">
              <div class="text-6xl mb-4">✅</div>
              <h4 class="text-lg font-black mb-2">No Approved Applications</h4>
              <p class="text-slate-400">You haven't approved any applications yet.</p>
            </div>
          `;
        } else {
          content.innerHTML = `
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl">
              <h4 class="text-lg font-black mb-6 text-emerald-700">✅ Approved Applications (${approvedApps.length})</h4>
              <div class="space-y-3">
                ${approvedApps.map(app => `
                  <div class="p-4 border rounded-xl bg-emerald-50/30">
                    <div class="flex justify-between items-center">
                      <div>
                        <p class="font-bold text-blue-600">${app.id}</p>
                        <p class="font-semibold">${app.customerName}</p>
                        <p class="text-sm">₹${(app.loanAmount || 0).toLocaleString()} • ${app.loanPurpose}</p>
                        <p class="text-xs text-green-600 mt-1">Approved on: ${app.decisionDate}</p>
                        ${app.bankerRemarks ? `<p class="text-xs text-slate-500 mt-1">Remarks: ${app.bankerRemarks}</p>` : ''}
                      </div>
                      <button onclick="showApplicationModal(${JSON.stringify(app).replace(/"/g, '&quot;')})" class="px-3 py-1 border rounded-lg text-sm hover:bg-slate-50">View</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }
      }
      else if (section === 'rejected') {
        if (rejectedApps.length === 0) {
          content.innerHTML = `
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl text-center py-12">
              <div class="text-6xl mb-4">❌</div>
              <h4 class="text-lg font-black mb-2">No Rejected Applications</h4>
              <p class="text-slate-400">You haven't rejected any applications yet.</p>
            </div>
          `;
        } else {
          content.innerHTML = `
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl">
              <h4 class="text-lg font-black mb-6 text-rose-700">❌ Rejected Applications (${rejectedApps.length})</h4>
              <div class="space-y-3">
                ${rejectedApps.map(app => `
                  <div class="p-4 border rounded-xl bg-rose-50/30">
                    <div class="flex justify-between items-center">
                      <div>
                        <p class="font-bold text-blue-600">${app.id}</p>
                        <p class="font-semibold">${app.customerName}</p>
                        <p class="text-sm">₹${(app.loanAmount || 0).toLocaleString()} • ${app.loanPurpose}</p>
                        <p class="text-xs text-rose-600 mt-1">Rejected on: ${app.decisionDate}</p>
                        ${app.bankerRemarks ? `<p class="text-xs text-slate-500 mt-1">Remarks: ${app.bankerRemarks}</p>` : ''}
                      </div>
                      <button onclick="showApplicationModal(${JSON.stringify(app).replace(/"/g, '&quot;')})" class="px-3 py-1 border rounded-lg text-sm hover:bg-slate-50">View</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }
      }
    }

    render();
  </script>
</body>
</html>
