<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connector Dashboard | Loan Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { transition: background-color 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
    .preview-image { cursor: pointer; transition: transform 0.2s; }
    .preview-image:hover { transform: scale(1.02); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950">
  <div id="app"></div>
  <div id="modal-container" class="fixed inset-0 z-50 hidden"></div>
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full"></div>
  <script>
    const STORAGE_KEY = 'loan_management_data';
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    let currentUser = state.currentUser || {};
    let tempFileUrls = {}; // Store temporary preview URLs

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      let classes = 'bg-emerald-50 border-emerald-200 text-emerald-800 dark:bg-emerald-950/80';
      if (type === 'error') classes = 'bg-rose-50 border-rose-200 text-rose-900 dark:bg-rose-950/80';
      else if (type === 'warning') classes = 'bg-amber-50 border-amber-200 text-amber-800 dark:bg-amber-950/80';
      toast.className = `p-4 rounded-xl shadow-lg border animate-slide-in ${classes}`;
      toast.innerHTML = `<div class="text-xs font-semibold">${message}</div><button onclick="this.parentElement.remove()" class="ml-4 text-xs opacity-70">✕</button>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function logout() { 
      state.currentUser = null;
      saveData(); 
      window.location.href = 'index.html'; 
    }

    // Preview document using temporary URL (instant)
    function previewDocument(fileInput, docName) {
      const file = fileInput.files[0];
      if (!file) return;
      
      const fileType = file.type;
      const url = URL.createObjectURL(file);
      tempFileUrls[docName] = url;
      
      const modalContainer = document.getElementById('modal-container');
      modalContainer.innerHTML = `
        <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 animate-fade-in" onclick="closePreviewModal(event)">
          <div class="bg-white dark:bg-slate-900 rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-auto p-4 mx-4" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-3 pb-2 border-b">
              <h4 class="font-bold">📄 Document Preview: ${file.name}</h4>
              <button onclick="closePreviewModal()" class="text-2xl text-slate-400 hover:text-slate-600">&times;</button>
            </div>
            <div class="flex justify-center items-center min-h-[300px]">
              ${fileType.startsWith('image/') ? 
                `<img src="${url}" class="max-w-full max-h-[70vh] object-contain rounded">` : 
                `<iframe src="${url}" class="w-full h-[70vh] border-0 rounded"></iframe>`
              }
            </div>
            <div class="mt-3 flex justify-end">
              <button onclick="window.open('${url}')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">Open in New Tab</button>
              <button onclick="closePreviewModal()" class="ml-2 px-4 py-2 bg-gray-600 text-white rounded-lg text-sm">Close</button>
            </div>
          </div>
        </div>
      `;
      modalContainer.classList.remove('hidden');
    }

    function closePreviewModal() {
      const modalContainer = document.getElementById('modal-container');
      modalContainer.classList.add('hidden');
      modalContainer.innerHTML = '';
      // Clean up temporary URLs
      Object.values(tempFileUrls).forEach(url => URL.revokeObjectURL(url));
      tempFileUrls = {};
    }

    window.previewDocument = previewDocument;
    window.closePreviewModal = closePreviewModal;

    // Show application details modal
    function showApplicationModal(app) {
      const modalContainer = document.getElementById('modal-container');
      modalContainer.innerHTML = `
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in" onclick="closeModal(event)">
          <div class="bg-white dark:bg-slate-900 rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6 shadow-2xl mx-4" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b pb-3 sticky top-0 bg-white dark:bg-slate-900">
              <h3 class="text-xl font-bold text-slate-900 dark:text-white">📋 Application Details</h3>
              <button onclick="closeModal()" class="text-2xl text-slate-400 hover:text-slate-600 transition">×</button>
            </div>
            <div class="space-y-4">
              <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">ID</p><p class="font-bold text-blue-600">${app.id}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Status</p><p class="font-bold">${app.status}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Customer</p><p class="font-bold">${app.customerName}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Loan Amount</p><p class="font-bold">₹${app.loanAmount?.toLocaleString()}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Salary</p><p class="font-bold">₹${app.monthlySalary?.toLocaleString()}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">CIBIL</p><p class="font-bold">${app.cibilScore}</p></div>
              </div>
              
              ${app.assignedBank ? `<div class="p-3 bg-green-50 rounded-xl"><p class="text-xs text-slate-400">Assigned Bank</p><p class="font-bold text-green-600">🏦 ${app.assignedBank}</p></div>` : '<div class="p-3 bg-amber-50 rounded-xl"><p class="text-xs text-slate-400">Bank Assignment</p><p class="font-bold text-amber-600">⏳ Pending</p></div>'}
              
              <div class="border rounded-xl p-4">
                <p class="text-sm font-bold mb-3 text-blue-600">📎 Uploaded Documents</p>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                  ${Object.entries(app.documents || {}).map(([docName, docData]) => `
                    <div class="border rounded-lg p-2 text-center">
                      <div class="text-xl">${docData.status === 'Uploaded' ? '📄' : '⏳'}</div>
                      <span class="text-xs capitalize">${docName}</span>
                      <p class="text-xs ${docData.status === 'Uploaded' ? 'text-green-600' : 'text-amber-600'}">${docData.status || 'Pending'}</p>
                      ${docData.fileName ? `<p class="text-[10px] text-slate-400 truncate">${docData.fileName}</p>` : ''}
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
            <div class="mt-6 flex justify-end"><button onclick="closeModal()" class="px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold">Close</button></div>
          </div>
        </div>
      `;
      modalContainer.classList.remove('hidden');
    }

    function closeModal() {
      const modalContainer = document.getElementById('modal-container');
      modalContainer.classList.add('hidden');
      modalContainer.innerHTML = '';
    }

    window.closeModal = closeModal;
    window.showApplicationModal = showApplicationModal;

    function render() {
      const myLeads = state.applications?.filter(a => a.connectorId === currentUser.id) || [];
      
      document.getElementById('app').innerHTML = `
        <div class="flex min-h-screen">
          <aside class="w-64 fixed h-full bg-white dark:bg-slate-900 border-r shadow-lg">
            <div class="h-16 flex items-center px-6 border-b">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-purple-600 flex items-center justify-center text-white font-bold">C</div>
                <span class="font-bold text-lg bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">Connector Portal</span>
              </div>
            </div>
            <div class="p-4">
              <div class="flex items-center gap-3 p-3 rounded-xl bg-gradient-to-br from-purple-500 to-pink-600 text-white mb-6">
                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center font-bold text-lg">${(currentUser.name || 'C').charAt(0)}</div>
                <div><h4 class="font-semibold">${currentUser.name}</h4><p class="text-xs opacity-80">${currentUser.company || 'Connector'}</p></div>
              </div>
              <nav class="space-y-1">
                <button onclick="showSection('dashboard')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 transition-all">📊 Dashboard</button>
                <button onclick="showSection('add')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 transition-all">➕ Add Customer</button>
                <button onclick="showSection('leads')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 transition-all">📋 My Leads</button>
                <button onclick="showSection('commission')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 transition-all">💰 Commission</button>
                <button onclick="logout()" class="w-full text-left px-4 py-3 rounded-xl text-rose-500 hover:bg-rose-50 transition-all">🚪 Logout</button>
              </nav>
            </div>
          </aside>
          <main class="flex-1 ml-64 p-6"><div id="content" class="animate-fade-in"></div></main>
        </div>
      `;
      showSection('dashboard');
    }

    function showSection(section) {
      const content = document.getElementById('content');
      const myLeads = state.applications?.filter(a => a.connectorId === currentUser.id) || [];
      const approvedLeads = myLeads.filter(a => a.status === 'Bank Approved').length;
      const totalCommission = (currentUser.commissionEarned || 0);
      
      if (section === 'dashboard') {
        content.innerHTML = `
          <div class="space-y-6">
            <div class="p-8 rounded-3xl bg-gradient-to-r from-purple-900 to-pink-900 text-white shadow-xl"><h3 class="text-2xl font-black">Connector Dashboard</h3><p class="text-sm text-purple-200">Welcome, ${currentUser.name}</p></div>
            <div class="grid grid-cols-3 gap-6">
              <div class="p-6 bg-white rounded-3xl border"><p class="text-slate-400">Total Leads</p><p class="text-3xl font-black">${myLeads.length}</p></div>
              <div class="p-6 bg-emerald-50 rounded-3xl border"><p class="text-emerald-700">Approved</p><p class="text-3xl font-black text-emerald-700">${approvedLeads}</p></div>
              <div class="p-6 bg-purple-50 rounded-3xl border"><p class="text-purple-700">Commission</p><p class="text-3xl font-black text-purple-700">₹${totalCommission.toLocaleString()}</p></div>
            </div>
            <button onclick="showSection('add')" class="px-6 py-3 bg-purple-600 text-white rounded-xl font-bold">➕ Add New Customer</button>
          </div>
        `;
      }
      else if (section === 'add') {
        content.innerHTML = `
          <div class="max-w-4xl mx-auto bg-white dark:bg-slate-900 rounded-3xl border p-8 shadow-xl">
            <h4 class="text-xl font-black mb-6">Add Customer Application</h4>
            <p class="text-sm text-amber-600 mb-4 bg-amber-50 p-3 rounded-lg">📌 After submission, admin will assign a bank or staff to process this application.</p>
            
            <form id="customerForm" class="space-y-6" enctype="multipart/form-data">
              <!-- Personal Details -->
              <div class="border-b pb-3">
                <h5 class="font-bold text-lg text-purple-600 mb-3">👤 Personal Details</h5>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <input type="text" name="name" placeholder="Full Name *" class="p-3 border rounded-xl" required>
                  <input type="email" name="email" placeholder="Email *" class="p-3 border rounded-xl" required>
                  <input type="tel" name="mobile" placeholder="Mobile *" class="p-3 border rounded-xl" required>
                  <input type="date" name="dob" placeholder="DOB" class="p-3 border rounded-xl">
                  <select name="gender" class="p-3 border rounded-xl"><option value="">Gender</option><option>Male</option><option>Female</option></select>
                  <input type="text" name="pinCode" placeholder="PIN Code *" class="p-3 border rounded-xl" required>
                  <input type="text" name="pan" placeholder="PAN Number *" class="p-3 border rounded-xl" required>
                  <input type="text" name="aadhaar" placeholder="Aadhaar" class="p-3 border rounded-xl">
                </div>
              </div>

              <!-- Employment Details -->
              <div class="border-b pb-3">
                <h5 class="font-bold text-lg text-purple-600 mb-3">💼 Employment Details</h5>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <select name="employmentType" class="p-3 border rounded-xl"><option value="">Employment Type</option><option>Salaried</option><option>Self-Employed</option><option>Business</option></select>
                  <input type="text" name="companyName" placeholder="Company Name" class="p-3 border rounded-xl">
                  <input type="number" name="workExperience" placeholder="Years Exp" class="p-3 border rounded-xl">
                  <input type="number" name="monthlySalary" placeholder="Monthly Salary *" class="p-3 border rounded-xl" required>
                  <input type="number" name="existingEmi" placeholder="Existing EMI" class="p-3 border rounded-xl">
                  <input type="number" name="cibil" placeholder="CIBIL Score *" class="p-3 border rounded-xl" required>
                </div>
              </div>

              <!-- Loan Details -->
              <div class="border-b pb-3">
                <h5 class="font-bold text-lg text-purple-600 mb-3">🏦 Loan Details</h5>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <select name="loanType" class="p-3 border rounded-xl"><option value="">Loan Type</option><option>Home Loan</option><option>Personal Loan</option><option>Business Loan</option><option>Education Loan</option><option>Car Loan</option></select>
                  <input type="number" name="loanAmount" placeholder="Loan Amount *" class="p-3 border rounded-xl" required>
                  <select name="loanPurpose" class="p-3 border rounded-xl"><option value="">Purpose</option><option>Home Purchase</option><option>Home Renovation</option><option>Business Expansion</option><option>Debt Consolidation</option></select>
                  <select name="loanTenure" class="p-3 border rounded-xl"><option value="">Tenure</option><option>12 months</option><option>24 months</option><option>36 months</option><option>48 months</option><option>60 months</option></select>
                </div>
              </div>

              <!-- Document Upload - Fast (No Base64 conversion) -->
              <div class="border-b pb-3">
                <h5 class="font-bold text-lg text-purple-600 mb-3">📎 Document Upload</h5>
                <p class="text-xs text-slate-500 mb-3">Files are uploaded instantly. Click preview to view before submission.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div class="border rounded-xl p-3"><label class="text-sm font-semibold block mb-1">PAN Card *</label><input type="file" name="panDoc" accept=".pdf,.jpg,.png" class="w-full text-sm" required><button type="button" onclick="previewDocument(this.previousElementSibling, 'pan')" class="mt-1 text-xs bg-blue-500 text-white px-2 py-1 rounded">Preview</button></div>
                  <div class="border rounded-xl p-3"><label class="text-sm font-semibold block mb-1">Aadhaar Card *</label><input type="file" name="aadhaarDoc" accept=".pdf,.jpg,.png" class="w-full text-sm" required><button type="button" onclick="previewDocument(this.previousElementSibling, 'aadhaar')" class="mt-1 text-xs bg-blue-500 text-white px-2 py-1 rounded">Preview</button></div>
                  <div class="border rounded-xl p-3"><label class="text-sm font-semibold block mb-1">Passport Photo *</label><input type="file" name="photoDoc" accept=".jpg,.png" class="w-full text-sm" required><button type="button" onclick="previewDocument(this.previousElementSibling, 'photo')" class="mt-1 text-xs bg-blue-500 text-white px-2 py-1 rounded">Preview</button></div>
                  <div class="border rounded-xl p-3"><label class="text-sm font-semibold block mb-1">Salary Slip *</label><input type="file" name="salaryDoc" accept=".pdf,.jpg,.png" class="w-full text-sm" required><button type="button" onclick="previewDocument(this.previousElementSibling, 'salary')" class="mt-1 text-xs bg-blue-500 text-white px-2 py-1 rounded">Preview</button></div>
                  <div class="border rounded-xl p-3"><label class="text-sm font-semibold block mb-1">Bank Statement</label><input type="file" name="bankDoc" accept=".pdf" class="w-full text-sm"><button type="button" onclick="previewDocument(this.previousElementSibling, 'bank')" class="mt-1 text-xs bg-blue-500 text-white px-2 py-1 rounded">Preview</button></div>
                  <div class="border rounded-xl p-3"><label class="text-sm font-semibold block mb-1">ITR / Form 16</label><input type="file" name="itrDoc" accept=".pdf" class="w-full text-sm"><button type="button" onclick="previewDocument(this.previousElementSibling, 'itr')" class="mt-1 text-xs bg-blue-500 text-white px-2 py-1 rounded">Preview</button></div>
                </div>
              </div>

              <div class="p-3 bg-purple-50 rounded-lg"><label class="flex items-start gap-3"><input type="checkbox" name="declaration" required class="mt-1"><span class="text-sm">I declare that all information is true and accurate.</span></label></div>
              <button type="submit" class="w-full py-3 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700 transition">Submit Application</button>
            </form>
          </div>
        `;
        
        document.getElementById('customerForm')?.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const fd = new FormData(e.target);
          const documents = {};
          
          // Store only file metadata (no Base64 conversion - FAST!)
          const fileInputs = ['panDoc', 'aadhaarDoc', 'photoDoc', 'salaryDoc', 'bankDoc', 'itrDoc'];
          for (const inputName of fileInputs) {
            const file = fd.get(inputName);
            const docKey = inputName.replace('Doc', '');
            if (file && file.size > 0) {
              documents[docKey] = {
                status: 'Uploaded',
                fileName: file.name,
                fileSize: (file.size / 1024).toFixed(1) + ' KB',
                fileType: file.type,
                uploadDate: new Date().toISOString()
              };
            } else if (inputName.includes('Doc') && (docKey === 'pan' || docKey === 'aadhaar' || docKey === 'photo' || docKey === 'salary')) {
              documents[docKey] = { status: 'Pending' };
            }
          }
          
          const newApplication = {
            id: 'APP-' + Date.now(),
            customerName: fd.get('name'),
            customerEmail: fd.get('email'),
            customerMobile: fd.get('mobile'),
            dob: fd.get('dob'),
            gender: fd.get('gender'),
            pinCode: fd.get('pinCode'),
            pan: fd.get('pan'),
            aadhaar: fd.get('aadhaar'),
            employmentType: fd.get('employmentType'),
            companyName: fd.get('companyName'),
            workExperience: fd.get('workExperience'),
            monthlySalary: parseInt(fd.get('salary')),
            existingEmi: parseInt(fd.get('existingEmi') || 0),
            cibilScore: parseInt(fd.get('cibil')),
            loanType: fd.get('loanType'),
            loanAmount: parseInt(fd.get('loanAmount')),
            loanPurpose: fd.get('loanPurpose'),
            loanTenure: fd.get('loanTenure')?.split(' ')[0] || '24',
            status: 'Pending',
            assignedBank: null,
            documents: documents,
            submittedBy: 'Connector',
            connectorId: currentUser.id,
            submittedDate: new Date().toISOString().split('T')[0],
            activityLog: [{ action: 'Application Submitted', timestamp: new Date().toISOString(), by: currentUser.name }]
          };
          
          if (!state.applications) state.applications = [];
          state.applications.unshift(newApplication);
          saveData();
          
          showToast('✅ Application submitted successfully!', 'success');
          showSection('leads');
        });
      }
      else if (section === 'leads') {
        if (myLeads.length === 0) {
          content.innerHTML = `<div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 text-center py-12"><div class="text-6xl mb-4">📭</div><h4 class="text-lg font-black mb-2">No Leads Yet</h4><button onclick="showSection('add')" class="mt-4 px-4 py-2 bg-purple-600 text-white rounded-lg text-sm">➕ Add Customer</button></div>`;
        } else {
          content.innerHTML = `
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl">
              <h4 class="text-lg font-black mb-6">📋 My Leads (${myLeads.length})</h4>
              <div class="space-y-3">
                ${myLeads.map(app => `
                  <div class="p-4 border rounded-xl hover:shadow-md cursor-pointer" onclick="showApplicationModal(${JSON.stringify(app).replace(/"/g, '&quot;')})">
                    <div class="flex justify-between items-start">
                      <div><p class="font-bold text-blue-600">${app.id}</p><p class="font-semibold">${app.customerName}</p><p class="text-sm">₹${app.loanAmount?.toLocaleString()} • ${app.loanPurpose || app.loanType}</p><p class="text-xs">Status: ${app.status} ${app.assignedBank ? `| Bank: ${app.assignedBank}` : ''}</p><div class="flex gap-2 mt-1 text-xs"><span class="text-slate-400">Docs:</span>${Object.entries(app.documents || {}).map(([k,v]) => `<span class="${v.status === 'Uploaded' ? 'text-green-600' : 'text-red-500'}">${k} ${v.status === 'Uploaded' ? '✓' : '✗'}</span>`).join('')}</div></div>
                      <button class="px-3 py-1 border rounded-lg text-sm" onclick="event.stopPropagation();showApplicationModal(${JSON.stringify(app).replace(/"/g, '&quot;')})">View</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }
      }
      else if (section === 'commission') {
        const approvedLeadsList = myLeads.filter(a => a.status === 'Bank Approved');
        const totalCommissionAmount = approvedLeadsList.reduce((sum, app) => sum + ((app.loanAmount || 0) * (currentUser.commissionRate / 100)), 0);
        content.innerHTML = `<div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl"><h4 class="text-lg font-black mb-6">💰 Commission Summary</h4><div class="p-6 bg-purple-50 rounded-2xl text-center mb-6"><p class="text-3xl font-black text-purple-700">₹${totalCommissionAmount.toLocaleString()}</p><p class="text-sm">Commission Rate: ${currentUser.commissionRate}%</p></div><div class="space-y-3">${approvedLeadsList.map(app => `<div class="p-3 border rounded-lg flex justify-between"><span>${app.customerName} - ₹${app.loanAmount?.toLocaleString()}</span><span class="text-green-600">+₹${((app.loanAmount || 0) * (currentUser.commissionRate / 100)).toFixed(0)}</span></div>`).join('')}</div></div>`;
      }
    }

    render();
  </script>
</body>
</html>
