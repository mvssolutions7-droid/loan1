    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || getInitialData();
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      let classes = 'bg-emerald-50 border-emerald-200 text-emerald-800 dark:bg-emerald-950/80';
      if (type === 'error') classes = 'bg-rose-50 border-rose-200 text-rose-900 dark:bg-rose-950/80';
      else if (type === 'info') classes = 'bg-blue-50 border-blue-200 text-blue-800 dark:bg-blue-950/80';
      else if (type === 'warning') classes = 'bg-amber-50 border-amber-200 text-amber-800 dark:bg-amber-950/80';
      toast.className = `p-4 rounded-xl shadow-lg border animate-slide-in ${classes}`;
      toast.innerHTML = `<div class="text-xs font-semibold">${message}</div><button onclick="this.parentElement.remove()" class="ml-4 text-xs opacity-70">✕</button>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function loginUser(role, email, password) {
      let user = null;
      
      if (role === 'admin' && email === 'admin@bank.com') {
        user = { id: 'ad1', name: 'Admin User', email, role: 'admin' };
      }
      else if (role === 'superadmin' && email === 'superadmin@bank.com') {
        user = { id: 'sa1', name: 'Super Admin', email, role: 'superadmin' };
      }
      else if (role === 'staff') {
        user = state.staff.find(s => s.email === email && s.password === password);
        if (user && user.status !== 'Active') {
          showToast('Your account is pending admin approval.', 'warning');
          return false;
        }
      }
      else if (role === 'banker') {
        user = state.bankers.find(b => b.email === email && b.password === password);
        if (user && user.status !== 'Approved') {
          showToast('Your account is pending admin approval.', 'warning');
          return false;
        }
        if (user) {
          const bank = state.banks.find(b => b.name === user.bankName);
          user.bankDetails = bank;
        }
      }
      else if (role === 'connector') {
        user = state.connectors.find(c => c.email === email && c.password === password);
        if (user && user.status !== 'Approved') {
          showToast('Your account is pending admin approval.', 'warning');
          return false;
        }
      }
      else if (role === 'customer') {
        user = state.customers.find(c => c.email === email && c.password === password);
      }
      
      if (user) {
        state.currentUser = { ...user, role };
        saveData();
        showToast(`Welcome ${user.name}!`, 'success');
        return true;
      }
      
      showToast('Invalid email or password', 'error');
      return false;
    }

    function registerUser(role, formData) {
      if (role === 'customer') {
        if (state.customers.find(c => c.email === formData.email)) {
          showToast('Email already registered!', 'error');
          return false;
        }
        const newUser = {
          id: 'c' + (state.customers.length + 1),
          name: formData.name,
          email: formData.email,
          password: formData.password,
          mobile: formData.mobile,
          pinCode: formData.pinCode || '560001',
          pan: formData.pan || 'ABCDE1234F',
          salary: parseInt(formData.salary) || 30000,
          cibil: parseInt(formData.cibil) || 700,
          status: 'Active'
        };
        state.customers.push(newUser);
        saveData();
        showToast(`✅ Registration successful! Welcome ${newUser.name}. You can now login.`, 'success');
        return true;
      }
      else if (role === 'connector') {
        if (state.connectors.find(c => c.email === formData.email)) {
          showToast('Email already registered!', 'error');
          return false;
        }
        const newUser = {
          id: 'con' + (state.connectors.length + 1),
          name: formData.name,
          company: formData.company,
          email: formData.email,
          password: formData.password,
          mobile: formData.mobile,
          status: 'Pending',
          commissionRate: 1.0,
          commissionEarned: 0
        };
        state.connectors.push(newUser);
        saveData();
        showToast(`✅ Registration submitted! Admin will approve your account soon.`, 'warning');
        return true;
      }
      else if (role === 'staff') {
        if (state.staff.find(s => s.email === formData.email)) {
          showToast('Email already registered!', 'error');
          return false;
        }
        const newUser = {
          id: 'st' + (state.staff.length + 1),
          name: formData.name,
          employeeId: 'STF' + (state.staff.length + 1),
          email: formData.email,
          password: formData.password,
          pinCodes: formData.pinCodes ? formData.pinCodes.split(',').map(p => p.trim()) : ['560001'],
          role: formData.staffRole || 'Eligibility Staff',
          status: 'Pending'
        };
        state.staff.push(newUser);
        saveData();
        showToast(`✅ Staff registration submitted! Admin approval required.`, 'warning');
        return true;
      }
      else if (role === 'banker') {
        if (state.bankers.find(b => b.email === formData.email)) {
          showToast('Email already registered!', 'error');
          return false;
        }
        const bank = state.banks.find(b => b.name === formData.bankName);
        if (!bank) {
          showToast('Please select a valid bank', 'error');
          return false;
        }
        const newUser = {
          id: 'bkr' + (state.bankers.length + 1),
          name: formData.name,
          bankId: bank.id,
          bankName: formData.bankName,
          email: formData.email,
          password: formData.password,
          whatsapp: formData.mobile,
          status: 'Pending'
        };
        state.bankers.push(newUser);
        saveData();
        showToast(`✅ Banker registration submitted for ${formData.bankName}! Admin approval required.`, 'warning');
        return true;
      }
      return false;
    }

                    <span class="px-2 py-1 rounded-full bg-${role.color}-100 dark:bg-${role.color}-900/30 text-${role.color}-700 dark:text-${role.color}-300 text-[10px] font-bold">${role.badge}</span>
                  </div>
                  <h3 class="text-xl font-bold mb-2">${role.title}</h3>
                  <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">${role.desc}</p>
                  <div class="flex gap-2 mt-auto">
                    <button onclick="showLoginModalWithRole('${role.id}')" class="flex-1 py-2.5 bg-gradient-to-r ${role.gradient} text-white rounded-xl text-xs font-bold hover:opacity-90 transition">Sign In</button>
                    <button onclick="showRegisterModal('${role.id}')" class="flex-1 py-2.5 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-xl text-xs font-bold hover:bg-slate-200 transition">Register</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </section>

          <!-- Testimonials -->
          <section class="bg-gradient-to-r from-slate-100 to-slate-50 dark:from-slate-800/30 dark:to-slate-800/30 py-16">
            <div class="max-w-7xl mx-auto px-6 text-center">
              <h2 class="text-3xl font-black mb-8">Trusted by Leading Banks</h2>
              <div class="flex flex-wrap justify-center gap-8 opacity-60">
                <span class="text-2xl font-bold text-slate-400">🏦 HDFC Bank</span>
                <span class="text-2xl font-bold text-slate-400">🏦 ICICI Bank</span>
                <span class="text-2xl font-bold text-slate-400">🏦 SBI</span>
                <span class="text-2xl font-bold text-slate-400">🏦 Axis Bank</span>
                <span class="text-2xl font-bold text-slate-400">🏦 Kotak</span>
              </div>
            </div>
          </section>

          <!-- CTA Section -->
          <section class="py-16">
            <div class="max-w-4xl mx-auto px-6 text-center">
              <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-3xl p-12 text-white shadow-2xl">
                <h2 class="text-3xl font-black mb-4">Ready to Get Started?</h2>
                <p class="text-blue-100 mb-6">Join thousands of users managing loans efficiently</p>
                <button onclick="showLoginModal()" class="px-8 py-3 bg-white text-indigo-600 font-bold rounded-xl hover:shadow-xl transition-all hover:scale-105">Login to Portal →</button>
              </div>
            </div>
          </section>

          <!-- Footer -->
          <footer class="bg-slate-900 text-slate-400 py-12">
            <div class="max-w-7xl mx-auto px-6 text-center">
              <div class="flex items-center justify-center gap-2 mb-4">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold">B</div>
                <span class="text-white font-bold">Bank Policy Update</span>
              </div>
              <p class="text-xs">© 2026 Secured Bank Policy Hub | 7 Role Workflow | PIN Based Staff Access | Bank-wise Email/WhatsApp</p>
            </div>
          </footer>
        </div>
      `;
    }

    window.showLoginModalWithRole = (role) => { showLoginModal(role); };

    window.showLoginModal = (preSelectedRole = 'customer') => {
      document.getElementById('app-root').innerHTML += `
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in" onclick="if(event.target===this) closeModal()">
          <div class="bg-white dark:bg-slate-800 rounded-2xl p-8 w-96 shadow-2xl transform transition-all">
            <div class="text-center mb-6">
              <div class="w-16 h-16 mx-auto bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center mb-3 shadow-lg">
                <span class="text-2xl">🔐</span>
              </div>
              <h3 class="text-2xl font-bold">Welcome Back</h3>
              <p class="text-sm text-slate-500 mt-1">Login to your workspace portal</p>
            </div>
            <select id="login-role" class="w-full p-3 border rounded-xl mb-3 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-blue-500">
              <option value="customer" ${preSelectedRole === 'customer' ? 'selected' : ''}>👤 Customer</option>
              <option value="connector" ${preSelectedRole === 'connector' ? 'selected' : ''}>🤝 Connector</option>
              <option value="staff" ${preSelectedRole === 'staff' ? 'selected' : ''}>👔 Staff</option>
              <option value="banker" ${preSelectedRole === 'banker' ? 'selected' : ''}>🏦 Banker</option>
              <option value="admin" ${preSelectedRole === 'admin' ? 'selected' : ''}>⚙️ Admin</option>
              <option value="superadmin" ${preSelectedRole === 'superadmin' ? 'selected' : ''}>👑 Super Admin</option>
            </select>
            <input type="email" id="login-email" placeholder="Email Address" class="w-full p-3 border rounded-xl mb-3 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-blue-500">
            <input type="password" id="login-password" placeholder="Password" class="w-full p-3 border rounded-xl mb-4 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-blue-500">
            <button onclick="doLogin()" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl font-bold hover:opacity-90 transition">Login</button>
            <button onclick="closeModal()" class="w-full mt-2 py-2 text-slate-500 hover:text-slate-700 transition">Cancel</button>
            <div class="mt-4 pt-3 border-t text-center">
              <p class="text-xs text-slate-400">New user? <button onclick="switchToRegister()" class="text-blue-600 font-semibold">Register here</button></p>
              <p class="text-xs text-slate-400 mt-2">Demo Password: <span class="font-mono font-bold">password</span></p>
            </div>
          </div>
        </div>
      `;
    };

    window.showRegisterModal = (role) => {
      let extraFields = '';
      let title = '';
      
      if (role === 'customer') {
        title = 'Customer Registration';
        extraFields = `
          <input type="text" id="reg-pincode" placeholder="PIN Code" class="w-full p-3 border rounded-xl bg-slate-50 dark:bg-slate-700">
          <input type="number" id="reg-salary" placeholder="Monthly Salary (₹)" class="w-full p-3 border rounded-xl bg-slate-50 dark:bg-slate-700" required>
          <input type="number" id="reg-cibil" placeholder="CIBIL Score" class="w-full p-3 border rounded-xl bg-slate-50 dark:bg-slate-700" required>
        `;
      } else if (role === 'connector') {
        title = 'Connector Registration';
        extraFields = `<input type="text" id="reg-company" placeholder="Company Name" class="w-full p-3 border rounded-xl bg-slate-50 dark:bg-slate-700" required>`;
      } else if (role === 'staff') {
        title = 'Staff Registration';
        extraFields = `
          <input type="text" id="reg-pincodes" placeholder="PIN Codes (comma separated)" class="w-full p-3 border rounded-xl bg-slate-50 dark:bg-slate-700" required>
          <select id="reg-staffrole" class="w-full p-3 border rounded-xl bg-slate-50 dark:bg-slate-700">
            <option value="Eligibility Staff">Eligibility Staff</option>
            <option value="Document Staff">Document Staff</option>
            <option value="Bank Sharing Staff">Bank Sharing Staff</option>
          </select>
        `;
      } else if (role === 'banker') {
        title = 'Banker Registration';
        extraFields = `
          <select id="reg-bankname" class="w-full p-3 border rounded-xl bg-slate-50 dark:bg-slate-700" required>
            <option value="">Select Your Bank</option>
            ${state.banks.map(bank => `<option value="${bank.name}">🏦 ${bank.name}</option>`).join('')}
          </select>
          <div class="p-3 bg-amber-50 dark:bg-amber-950/30 rounded-lg text-xs">⚠️ Account needs admin approval</div>
        `;
      }
      
      document.getElementById('app-root').innerHTML += `
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in" onclick="if(event.target===this) closeModal()">
          <div class="bg-white dark:bg-slate-800 rounded-2xl p-8 w-96 max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="text-center mb-6">
              <div class="w-16 h-16 mx-auto bg-gradient-to-br from-green-500 to-emerald-600 rounded-full flex items-center justify-center mb-3"><span class="text-2xl">📝</span></div>
              <h3 class="text-2xl font-bold">${title}</h3>
            </div>
            <form id="registerForm" class="space-y-3">
              <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-3 border rounded-xl" required>
              <input type="email" id="reg-email" placeholder="Email" class="w-full p-3 border rounded-xl" required>
              <input type="tel" id="reg-mobile" placeholder="Mobile" class="w-full p-3 border rounded-xl" required>
              <input type="password" id="reg-password" placeholder="Password" class="w-full p-3 border rounded-xl" required>
              ${extraFields}
              <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl font-bold">Register</button>
              <button type="button" onclick="closeModal()" class="w-full mt-2 py-2 text-slate-500">Cancel</button>
            </form>
          </div>
        </div>
      `;
      
      document.getElementById('registerForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const formData = {
          name: document.getElementById('reg-name').value,
          email: document.getElementById('reg-email').value,
          mobile: document.getElementById('reg-mobile').value,
          password: document.getElementById('reg-password').value,
          pinCode: document.getElementById('reg-pincode')?.value,
          salary: document.getElementById('reg-salary')?.value,
          cibil: document.getElementById('reg-cibil')?.value,
          company: document.getElementById('reg-company')?.value,
          pinCodes: document.getElementById('reg-pincodes')?.value,
          staffRole: document.getElementById('reg-staffrole')?.value,
          bankName: document.getElementById('reg-bankname')?.value
        };
        
        if (registerUser(role, formData)) {
          setTimeout(() => { closeModal(); showLoginModalWithRole(role); }, 2000);
        }
      });
    };

    window.switchToRegister = () => {
      const role = document.getElementById('login-role').value;
      closeModal();
      showRegisterModal(role);
    };

    window.doLogin = () => {
      const role = document.getElementById('login-role').value;
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      if (loginUser(role, email, password)) {
        window.location.href = `${role}-dashboard.html`;
      }
    };

    window.closeModal = () => { location.reload(); };

    renderLanding();
  </script>
</body>
</html>
