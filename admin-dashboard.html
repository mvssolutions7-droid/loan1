<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Loan Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { transition: background-color 0.2s ease, border-color 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
    .preview-image { cursor: pointer; transition: transform 0.2s; }
    .preview-image:hover { transform: scale(1.02); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans">
  <div id="app"></div>
  <div id="modal-container" class="fixed inset-0 z-50 hidden"></div>
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full"></div>

  <script>
    const STORAGE_KEY = 'loan_management_data';
    
    function getInitialData() {
      const existing = localStorage.getItem(STORAGE_KEY);
      if (existing) return JSON.parse(existing);
      
      return {
        banks: [
          { id: 'b1', name: 'Federal Trust Bank', minSalary: 25000, minCibil: 700, maxLoan: 5000000, interestRate: 10.5, processingFee: 1.5, approvalTime: '48 Hours', status: 'Active' },
          { id: 'b2', name: 'National Alliance Bank', minSalary: 45000, minCibil: 750, maxLoan: 7500000, interestRate: 10.75, processingFee: 1.0, approvalTime: '72 Hours', status: 'Active' },
          { id: 'b3', name: 'Apex Credit Union', minSalary: 15000, minCibil: 650, maxLoan: 3000000, interestRate: 11.5, processingFee: 2.0, approvalTime: '24 Hours', status: 'Active' },
          { id: 'b4', name: 'Metropolitan Bank', minSalary: 35000, minCibil: 720, maxLoan: 10000000, interestRate: 9.75, processingFee: 1.0, approvalTime: '96 Hours', status: 'Active' }
        ],
        staff: [
          { id: 'st1', name: 'Meena Sharma', employeeId: 'STF001', email: 'meena@bank.com', password: 'password', pinCodes: ['560076', '560068'], role: 'Eligibility Staff', status: 'Active' },
          { id: 'st2', name: 'Kavya Reddy', employeeId: 'STF002', email: 'kavya@bank.com', password: 'password', pinCodes: ['560029'], role: 'Document Staff', status: 'Active' }
        ],
        bankers: [
          { id: 'bkr1', name: 'Amit Patel', bankId: 'b1', bankName: 'Federal Trust Bank', email: 'amit@federaltrust.com', password: 'password', whatsapp: '9876543210', status: 'Approved' },
          { id: 'bkr2', name: 'Priya Singh', bankId: 'b2', bankName: 'National Alliance Bank', email: 'priya@nationalalliance.com', password: 'password', whatsapp: '9876543211', status: 'Approved' }
        ],
        connectors: [
          { id: 'con1', name: 'Vikram Singh', company: 'Prime Fin Services', email: 'vikram@prime.com', password: 'password', mobile: '9123456789', status: 'Approved', commissionRate: 1.5, commissionEarned: 0 }
        ],
        customers: [
          { id: 'c1', name: 'Aarav Sharma', email: 'aarav@gmail.com', password: 'password', mobile: '9876543210', pinCode: '560076', pan: 'ABCDE1234F', salary: 40000, cibil: 720, status: 'Active' }
        ],
        applications: [],
        pendingRegistrations: {
          connectors: [],
          staff: [],
          bankers: []
        },
        currentUser: null
      };
    }

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || getInitialData();
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      let classes = 'bg-emerald-50 border-emerald-200 text-emerald-800 dark:bg-emerald-950/80';
      if (type === 'error') classes = 'bg-rose-50 border-rose-200 text-rose-900 dark:bg-rose-950/80';
      else if (type === 'warning') classes = 'bg-amber-50 border-amber-200 text-amber-800 dark:bg-amber-950/80';
      toast.className = `p-4 rounded-xl shadow-lg border animate-slide-in ${classes}`;
      toast.innerHTML = `<div class="text-xs font-semibold">${message}</div><button onclick="this.parentElement.remove()" class="ml-4 text-xs opacity-70">✕</button>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function logout() { state.currentUser = null; saveData(); window.location.href = 'index.html'; }

    // ==================== REGISTRATION APPROVAL FUNCTIONS ====================
    
    // Approve Connector Registration
    function approveConnector(connectorId) {
      const pendingConnector = state.pendingRegistrations?.connectors?.find(c => c.id === connectorId);
      if (pendingConnector) {
        pendingConnector.status = 'Approved';
        state.connectors.push(pendingConnector);
        state.pendingRegistrations.connectors = state.pendingRegistrations.connectors.filter(c => c.id !== connectorId);
        saveData();
        showToast(`✅ Connector ${pendingConnector.name} approved successfully!`, 'success');
        render();
      }
    }

    function rejectConnector(connectorId) {
      const pendingConnector = state.pendingRegistrations?.connectors?.find(c => c.id === connectorId);
      if (pendingConnector && confirm(`Reject connector ${pendingConnector.name}?`)) {
        state.pendingRegistrations.connectors = state.pendingRegistrations.connectors.filter(c => c.id !== connectorId);
        saveData();
        showToast(`❌ Connector ${pendingConnector.name} rejected.`, 'warning');
        render();
      }
    }

    // Approve Staff Registration
    function approveStaff(staffId) {
      const pendingStaff = state.pendingRegistrations?.staff?.find(s => s.id === staffId);
      if (pendingStaff) {
        pendingStaff.status = 'Active';
        state.staff.push(pendingStaff);
        state.pendingRegistrations.staff = state.pendingRegistrations.staff.filter(s => s.id !== staffId);
        saveData();
        showToast(`✅ Staff ${pendingStaff.name} approved successfully!`, 'success');
        render();
      }
    }

    function rejectStaff(staffId) {
      const pendingStaff = state.pendingRegistrations?.staff?.find(s => s.id === staffId);
      if (pendingStaff && confirm(`Reject staff ${pendingStaff.name}?`)) {
        state.pendingRegistrations.staff = state.pendingRegistrations.staff.filter(s => s.id !== staffId);
        saveData();
        showToast(`❌ Staff ${pendingStaff.name} rejected.`, 'warning');
        render();
      }
    }

    // Approve Banker Registration
    function approveBanker(bankerId) {
      const pendingBanker = state.pendingRegistrations?.bankers?.find(b => b.id === bankerId);
      if (pendingBanker) {
        pendingBanker.status = 'Approved';
        state.bankers.push(pendingBanker);
        state.pendingRegistrations.bankers = state.pendingRegistrations.bankers.filter(b => b.id !== bankerId);
        saveData();
        showToast(`✅ Banker ${pendingBanker.name} approved for ${pendingBanker.bankName}!`, 'success');
        render();
      }
    }

    function rejectBanker(bankerId) {
      const pendingBanker = state.pendingRegistrations?.bankers?.find(b => b.id === bankerId);
      if (pendingBanker && confirm(`Reject banker ${pendingBanker.name}?`)) {
        state.pendingRegistrations.bankers = state.pendingRegistrations.bankers.filter(b => b.id !== bankerId);
        saveData();
        showToast(`❌ Banker ${pendingBanker.name} rejected.`, 'warning');
        render();
      }
    }

    // Delete Application function
    function deleteApplication(appId) {
      const app = state.applications.find(a => a.id === appId);
      if (!app) return;
      
      if (confirm(`⚠️ Are you sure you want to delete application ${appId} for ${app.customerName}?\n\nThis action cannot be undone!`)) {
        state.applications = state.applications.filter(a => a.id !== appId);
        saveData();
        showToast(`✅ Application ${appId} has been deleted successfully.`, 'success');
        render();
      }
    }

    // Preview document function
    function previewDocument(dataUrl, fileName, fileType) {
      const modalContainer = document.getElementById('modal-container');
      modalContainer.innerHTML = `
        <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 animate-fade-in" onclick="closePreviewModal(event)">
          <div class="bg-white dark:bg-slate-900 rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-auto p-4 mx-4" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-3 pb-2 border-b">
              <h4 class="font-bold">📄 Document Preview: ${fileName}</h4>
              <button onclick="closePreviewModal()" class="text-2xl text-slate-400 hover:text-slate-600">&times;</button>
            </div>
            <div class="flex justify-center items-center min-h-[300px]">
              ${fileType === 'image' ? 
                `<img src="${dataUrl}" class="max-w-full max-h-[70vh] object-contain rounded">` : 
                `<iframe src="${dataUrl}" class="w-full h-[70vh] border-0 rounded"></iframe>`
              }
            </div>
            <div class="mt-3 flex justify-end">
              <button onclick="window.open('${dataUrl}')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">Open in New Tab</button>
            </div>
          </div>
        </div>
      `;
      modalContainer.classList.remove('hidden');
    }

    function closePreviewModal() {
      const modalContainer = document.getElementById('modal-container');
      modalContainer.classList.add('hidden');
      modalContainer.innerHTML = '';
    }

    window.previewDocument = previewDocument;
    window.closePreviewModal = closePreviewModal;
    window.deleteApplication = deleteApplication;
    window.approveConnector = approveConnector;
    window.rejectConnector = rejectConnector;
    window.approveStaff = approveStaff;
    window.rejectStaff = rejectStaff;
    window.approveBanker = approveBanker;
    window.rejectBanker = rejectBanker;

    // Show application details modal with document preview and delete option
    function showApplicationModal(app) {
      const modalContainer = document.getElementById('modal-container');
      modalContainer.innerHTML = `
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in" onclick="closeModal(event)">
          <div class="bg-white dark:bg-slate-900 rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6 shadow-2xl mx-4" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b pb-3 sticky top-0 bg-white dark:bg-slate-900">
              <h3 class="text-xl font-bold text-slate-900 dark:text-white">📋 Application Details</h3>
              <button onclick="closeModal()" class="text-2xl text-slate-400 hover:text-slate-600 transition">×</button>
            </div>
            <div class="space-y-4">
              <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Application ID</p><p class="font-bold text-blue-600">${app.id}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Status</p><p class="font-bold"><span class="px-2 py-1 rounded-full text-xs ${app.status === 'Bank Approved' ? 'bg-green-100 text-green-700' : app.status === 'Pending' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}">${app.status}</span></p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Customer Name</p><p class="font-bold">${app.customerName}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Email</p><p class="font-bold">${app.customerEmail}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Mobile</p><p class="font-bold">${app.customerMobile}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Loan Amount</p><p class="font-bold text-green-600">₹${app.loanAmount?.toLocaleString()}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Monthly Salary</p><p class="font-bold">₹${app.monthlySalary?.toLocaleString()}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">CIBIL Score</p><p class="font-bold">${app.cibilScore}</p></div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl"><p class="text-xs text-slate-400">Loan Purpose</p><p class="font-bold">${app.loanPurpose}</p></div>
              </div>
              
              ${app.assignedBank ? `<div class="p-3 bg-green-50 dark:bg-green-950/30 rounded-xl"><p class="text-xs text-slate-400">Assigned Bank</p><p class="font-bold text-green-600">🏦 ${app.assignedBank}</p></div>` : ''}
              
              <!-- Documents Section with Preview -->
              <div class="border rounded-xl p-4">
                <p class="text-sm font-bold mb-3 text-blue-600">📎 Uploaded Documents</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                  ${Object.entries(app.documents || {}).map(([docName, docData]) => `
                    <div class="border rounded-lg p-3 bg-slate-50 dark:bg-slate-800/50">
                      <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-semibold capitalize">${docName.replace(/([A-Z])/g, ' $1').trim()}</span>
                        <span class="text-xs px-2 py-0.5 rounded-full ${docData.status === 'Uploaded' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-500'}">${docData.status || 'Pending'}</span>
                      </div>
                      ${docData.dataUrl ? `
                        <div class="mt-2">
                          ${docData.fileType === 'image' ? 
                            `<img src="${docData.dataUrl}" class="w-full h-32 object-cover rounded-lg cursor-pointer preview-image" onclick="previewDocument('${docData.dataUrl}', '${docData.fileName}', 'image')">` : 
                            `<div class="flex items-center gap-2 p-2 bg-white dark:bg-slate-700 rounded-lg">
                              <span class="text-2xl">📄</span>
                              <span class="text-sm truncate flex-1">${docData.fileName}</span>
                              <button onclick="previewDocument('${docData.dataUrl}', '${docData.fileName}', 'pdf')" class="px-2 py-1 bg-blue-500 text-white rounded text-xs">Preview</button>
                            </div>`
                          }
                          <p class="text-xs text-slate-400 mt-1 truncate">${docData.fileName || ''} (${docData.fileSize || '0 KB'})</p>
                        </div>
                      ` : '<p class="text-xs text-slate-400 mt-2 italic">No file uploaded</p>'}
                    </div>
                  `).join('')}
                </div>
              </div>
              
              <!-- Activity Log -->
              ${app.activityLog && app.activityLog.length ? `
              <div class="border rounded-xl p-4">
                <p class="text-sm font-bold mb-3 text-purple-600">📜 Activity Log</p>
                <div class="space-y-1 max-h-32 overflow-y-auto">
                  ${app.activityLog.map(log => `<div class="text-xs p-1 border-b"><span class="text-slate-400">${new Date(log.timestamp).toLocaleString()}</span> - ${log.action} <span class="text-slate-400">by ${log.by}</span></div>`).join('')}
                </div>
              </div>
              ` : ''}
            </div>
            <div class="mt-6 flex justify-end gap-3">
              <button onclick="deleteApplication('${app.id}')" class="px-5 py-2 bg-red-600 text-white rounded-xl text-sm font-bold hover:bg-red-700 transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Delete Application
              </button>
              <button onclick="closeModal()" class="px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">Close</button>
            </div>
          </div>
        </div>
      `;
      modalContainer.classList.remove('hidden');
    }

    function closeModal() {
      const modalContainer = document.getElementById('modal-container');
      modalContainer.classList.add('hidden');
      modalContainer.innerHTML = '';
    }

    window.closeModal = closeModal;
    window.showApplicationModal = showApplicationModal;

    // Calculate eligible banks with full policy details
    function calculateEligibleBanks(salary, cibil, loanAmount) {
      return state.banks.filter(bank => 
        bank.minSalary <= salary && 
        bank.minCibil <= cibil && 
        bank.maxLoan >= loanAmount &&
        bank.status === 'Active'
      ).map(bank => ({
        ...bank,
        isEligible: true,
        matchSalary: bank.minSalary <= salary,
        matchCibil: bank.minCibil <= cibil,
        matchLoan: bank.maxLoan >= loanAmount
      }));
    }

    function assignDirectToBank(appId, bankName) {
      if (!bankName) { showToast('Please select a bank', 'error'); return; }
      const app = state.applications.find(a => a.id === appId);
      if (app) {
        app.assignedBank = bankName;
        app.status = 'Sent to Bank';
        app.assignedDate = new Date().toISOString().split('T')[0];
        if (!app.activityLog) app.activityLog = [];
        app.activityLog.push({ action: `Directly assigned to bank: ${bankName}`, timestamp: new Date().toISOString(), by: 'Admin' });
        saveData();
        showToast(`✅ Bank "${bankName}" assigned. Application sent to bank.`, 'success');
        render();
      }
    }

    window.assignDirectToBank = assignDirectToBank;

    function render() {
      const pendingApps = state.applications?.filter(a => a.status === 'Pending' && !a.assignedBank) || [];
      const allApps = state.applications || [];
      const pendingConnectors = state.pendingRegistrations?.connectors || [];
      const pendingStaff = state.pendingRegistrations?.staff || [];
      const pendingBankers = state.pendingRegistrations?.bankers || [];
      const totalPending = pendingConnectors.length + pendingStaff.length + pendingBankers.length;
      
      document.getElementById('app').innerHTML = `
        <div class="flex min-h-screen">
          <aside class="w-64 fixed h-full bg-white dark:bg-slate-900 border-r shadow-lg">
            <div class="h-16 flex items-center px-6 border-b"><span class="font-bold text-xl bg-gradient-to-r from-red-600 to-rose-600 bg-clip-text text-transparent">Admin Panel</span></div>
            <div class="p-4"><div class="flex items-center gap-3 p-3 rounded-xl bg-gradient-to-br from-red-500 to-rose-600 text-white mb-6"><div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center font-bold">A</div><div><h4 class="font-semibold">Admin</h4><p class="text-xs opacity-80">administrator</p></div></div>
            <nav class="space-y-1">
              <button onclick="showSection('dashboard')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 transition-all">📊 Dashboard</button>
              <button onclick="showSection('pending')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 transition-all">📋 Pending Apps (${pendingApps.length})</button>
              <button onclick="showSection('applications')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 transition-all">📂 All Applications</button>
              <button onclick="showSection('registrations')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 transition-all">👥 Pending Approvals (${totalPending})</button>
              <button onclick="logout()" class="w-full text-left px-4 py-3 rounded-xl text-rose-500 hover:bg-rose-50 transition-all">🚪 Logout</button>
            </nav></div>
          </aside>
          <main class="flex-1 ml-64 p-6"><div id="content" class="animate-fade-in"></div></main>
        </div>
      `;
      showSection('dashboard');
    }

    function showSection(section) {
      const content = document.getElementById('content');
      const pendingApps = state.applications?.filter(a => a.status === 'Pending' && !a.assignedBank) || [];
      const allApps = state.applications || [];
      const pendingConnectors = state.pendingRegistrations?.connectors || [];
      const pendingStaff = state.pendingRegistrations?.staff || [];
      const pendingBankers = state.pendingRegistrations?.bankers || [];
      
      if (section === 'dashboard') {
        content.innerHTML = `
          <div class="space-y-6">
            <div class="p-8 rounded-3xl bg-gradient-to-r from-red-900 to-rose-900 text-white shadow-xl"><h3 class="text-2xl font-black">Admin Dashboard</h3><p class="text-sm text-rose-200">Manage applications & user registrations</p></div>
            <div class="grid grid-cols-4 gap-6">
              <div class="p-6 bg-white rounded-3xl border"><p class="text-slate-400">Total Apps</p><p class="text-3xl font-black">${allApps.length}</p></div>
              <div class="p-6 bg-amber-50 rounded-3xl border"><p class="text-amber-700">Pending Apps</p><p class="text-3xl font-black text-amber-700">${pendingApps.length}</p></div>
              <div class="p-6 bg-green-50 rounded-3xl border"><p class="text-green-700">Approved</p><p class="text-3xl font-black text-green-700">${allApps.filter(a => a.status === 'Bank Approved').length}</p></div>
              <div class="p-6 bg-purple-50 rounded-3xl border"><p class="text-purple-700">Pending Approvals</p><p class="text-3xl font-black text-purple-700">${pendingConnectors.length + pendingStaff.length + pendingBankers.length}</p></div>
            </div>
            <div class="grid grid-cols-2 gap-4"><button onclick="showSection('pending')" class="px-6 py-3 bg-red-600 text-white rounded-xl font-bold">📋 Process Pending Apps →</button><button onclick="showSection('registrations')" class="px-6 py-3 bg-purple-600 text-white rounded-xl font-bold">👥 Approve Registrations →</button></div>
          </div>
        `;
      }
      else if (section === 'pending') {
        if (pendingApps.length === 0) {
          content.innerHTML = `<div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 text-center py-12"><div class="text-6xl mb-4">✅</div><h4 class="text-lg font-black mb-2">No Pending Applications</h4><p class="text-slate-400">All applications have been assigned to banks.</p></div>`;
        } else {
          content.innerHTML = `<div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl"><h4 class="text-lg font-black mb-6">📋 Pending Applications (${pendingApps.length})</h4><div class="space-y-4">${pendingApps.map(app => {
            const eligibleBanks = calculateEligibleBanks(app.monthlySalary, app.cibilScore, app.loanAmount);
            return `
              <div class="p-5 border-2 border-amber-200 rounded-xl bg-amber-50/30">
                <div class="flex justify-between items-start mb-3"><div><h5 class="font-bold text-lg">${app.customerName}</h5><p class="text-sm text-slate-500">ID: ${app.id} • By: ${app.submittedBy}</p></div><span class="px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-xs">Pending</span><button onclick="deleteApplication('${app.id}')" class="px-3 py-1 bg-red-500 text-white rounded-lg text-xs hover:bg-red-600 transition">🗑 Delete</button></div>
                <div class="grid grid-cols-4 gap-3 mb-4 text-sm"><div><p class="text-slate-400">Loan</p><p class="font-bold">₹${app.loanAmount?.toLocaleString()}</p></div><div><p class="text-slate-400">Salary</p><p class="font-bold">₹${app.monthlySalary?.toLocaleString()}</p></div><div><p class="text-slate-400">CIBIL</p><p class="font-bold">${app.cibilScore}</p></div><div><p class="text-slate-400">Documents</p><p class="font-bold">${Object.values(app.documents || {}).filter(d => d.status === 'Uploaded').length}/${Object.keys(app.documents || {}).length}</p></div></div>
                
                <!-- Bank Eligibility Policy Section -->
                <div class="mb-4 p-3 bg-green-50 dark:bg-green-950/20 rounded-lg">
                  <p class="text-sm font-bold text-green-700 mb-2">🏦 Bank Eligibility Policy</p>
                  <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                    <div class="flex justify-between p-2 bg-white rounded"><span>Salary:</span><span class="font-bold">₹${app.monthlySalary?.toLocaleString()}</span></div>
                    <div class="flex justify-between p-2 bg-white rounded"><span>CIBIL:</span><span class="font-bold">${app.cibilScore}</span></div>
                    <div class="flex justify-between p-2 bg-white rounded"><span>Loan:</span><span class="font-bold">₹${app.loanAmount?.toLocaleString()}</span></div>
                    <div class="flex justify-between p-2 bg-white rounded"><span>FOIR:</span><span class="font-bold">${app.foir || 'Calculated'}%</span></div>
                  </div>
                </div>
                
                <!-- Eligible Banks List -->
                <div class="mb-4">
                  <p class="text-sm font-bold text-blue-700 mb-2">✅ Eligible Banks (${eligibleBanks.length}):</p>
                  <div class="space-y-2 max-h-48 overflow-y-auto">
                    ${eligibleBanks.map(bank => `
                      <div class="p-2 border rounded-lg bg-white flex justify-between items-center">
                        <div><p class="font-semibold text-sm">${bank.name}</p><div class="flex gap-3 text-xs text-slate-500"><span>Min Salary: ₹${bank.minSalary.toLocaleString()}</span><span>Min CIBIL: ${bank.minCibil}</span><span>Interest: ${bank.interestRate}%</span></div></div>
                        <span class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full">Eligible ✓</span>
                      </div>
                    `).join('')}
                    ${eligibleBanks.length === 0 ? '<div class="p-3 bg-red-50 text-red-600 rounded-lg text-sm text-center">⚠️ No banks match eligibility criteria</div>' : ''}
                  </div>
                </div>
                
                <div class="mb-4 p-3 rounded-xl bg-blue-50"><p class="text-sm font-bold text-blue-700 mb-2">🏦 Assign Direct to Bank</p><div class="flex gap-2"><select id="bank-${app.id}" class="px-3 py-2 border rounded-lg text-sm flex-1"><option value="">Select Bank...</option>${eligibleBanks.map(b => `<option value="${b.name}">${b.name}</option>`).join('')}</select><button onclick="assignDirectToBank('${app.id}', document.getElementById('bank-${app.id}').value)" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">Send to Bank</button></div><p class="text-xs text-blue-500 mt-2">Staff will also have access to all applications</p></div>
                <div class="flex justify-between items-center"><button onclick="showApplicationModal(${JSON.stringify(app).replace(/"/g, '&quot;')})" class="px-3 py-1.5 bg-slate-600 text-white rounded-lg text-xs">View Full Details & Documents</button><span class="text-xs text-slate-400">${Object.values(app.documents || {}).filter(d => d.status === 'Uploaded').length} documents uploaded</span></div>
              </div>
            `;
          }).join('')}</div></div>`;
        }
      }
      else if (section === 'applications') {
        content.innerHTML = `<div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl"><h4 class="text-lg font-black mb-6">All Applications (${allApps.length})</h4><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b"><th class="text-left py-3">ID</th><th>Customer</th><th>Loan</th><th>Status</th><th>Assigned Bank</th><th>Documents</th><th>Actions</th></tr></thead><tbody>${allApps.map(app => `<tr class="border-b"><td class="py-3 font-mono text-blue-600">${app.id}</td><td class="font-bold">${app.customerName}</td><td>₹${app.loanAmount?.toLocaleString()}</td><td><span class="px-2 py-1 rounded-full text-xs ${app.status === 'Bank Approved' ? 'bg-green-100 text-green-700' : app.status === 'Pending' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}">${app.status}</span></td><td>${app.assignedBank ? `🏦 ${app.assignedBank}` : '—'}</td><td><span class="text-xs">${Object.values(app.documents || {}).filter(d => d.status === 'Uploaded').length}/${Object.keys(app.documents || {}).length} files</span></td><td class="flex gap-1"><button onclick="showApplicationModal(${JSON.stringify(app).replace(/"/g, '&quot;')})" class="px-2 py-1 bg-blue-600 text-white rounded text-xs">View</button><button onclick="deleteApplication('${app.id}')" class="px-2 py-1 bg-red-600 text-white rounded text-xs">Delete</button></td></tr>`).join('')}</tbody>}</div></div>`;
      }
      else if (section === 'registrations') {
        content.innerHTML = `
          <div class="space-y-8">
            <!-- Pending Connector Approvals -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl">
              <h4 class="text-lg font-black mb-4 flex items-center gap-2"><span class="text-purple-600">🤝</span> Pending Connector Approvals (${pendingConnectors.length})</h4>
              ${pendingConnectors.length === 0 ? '<p class="text-slate-400 text-center py-4">No pending connector registrations.</p>' : `
                <div class="space-y-3">${pendingConnectors.map(c => `
                  <div class="p-4 border rounded-xl flex justify-between items-center">
                    <div><p class="font-bold">${c.name}</p><p class="text-sm text-slate-500">${c.company} • ${c.email} • ${c.mobile}</p><p class="text-xs text-amber-600">Commission Rate: ${c.commissionRate}%</p></div>
                    <div class="flex gap-2"><button onclick="approveConnector('${c.id}')" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm">✅ Approve</button><button onclick="rejectConnector('${c.id}')" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">❌ Reject</button></div>
                  </div>`).join('')}</div>
              `}
            </div>
            
            <!-- Pending Staff Approvals -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl">
              <h4 class="text-lg font-black mb-4 flex items-center gap-2"><span class="text-amber-600">👔</span> Pending Staff Approvals (${pendingStaff.length})</h4>
              ${pendingStaff.length === 0 ? '<p class="text-slate-400 text-center py-4">No pending staff registrations.</p>' : `
                <div class="space-y-3">${pendingStaff.map(s => `
                  <div class="p-4 border rounded-xl flex justify-between items-center">
                    <div><p class="font-bold">${s.name}</p><p class="text-sm text-slate-500">${s.role} • ${s.email} • PIN: ${s.pinCodes?.join(', ')}</p></div>
                    <div class="flex gap-2"><button onclick="approveStaff('${s.id}')" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm">✅ Approve</button><button onclick="rejectStaff('${s.id}')" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">❌ Reject</button></div>
                  </div>`).join('')}</div>
              `}
            </div>
            
            <!-- Pending Banker Approvals -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl border p-6 shadow-xl">
              <h4 class="text-lg font-black mb-4 flex items-center gap-2"><span class="text-teal-600">🏦</span> Pending Banker Approvals (${pendingBankers.length})</h4>
              ${pendingBankers.length === 0 ? '<p class="text-slate-400 text-center py-4">No pending banker registrations.</p>' : `
                <div class="space-y-3">${pendingBankers.map(b => `
                  <div class="p-4 border rounded-xl flex justify-between items-center">
                    <div><p class="font-bold">${b.name}</p><p class="text-sm text-slate-500">${b.bankName} • ${b.email} • WhatsApp: ${b.whatsapp}</p></div>
                    <div class="flex gap-2"><button onclick="approveBanker('${b.id}')" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm">✅ Approve</button><button onclick="rejectBanker('${b.id}')" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">❌ Reject</button></div>
                  </div>`).join('')}</div>
              `}
            </div>
          </div>
        `;
      }
    }

    render();
  </script>
</body>
</html>
